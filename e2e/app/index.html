<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TodoMVC — klew demo</title>
  <style>
    * { box-sizing: border-box; }
    body { font: 15px/1.4 system-ui, sans-serif; background: #f5f5f5; color: #111; margin: 0; padding: 40px 0; }
    .todoapp { max-width: 550px; margin: 0 auto; background: #fff; box-shadow: 0 2px 4px rgba(0,0,0,.15); }
    h1 { text-align: center; color: #b83f45; font-weight: 200; font-size: 60px; margin: 0; padding: 10px 0; }
    .new-todo { width: 100%; padding: 16px 16px 16px 60px; border: none; font-size: 22px; box-shadow: inset 0 -2px 1px rgba(0,0,0,.03); }
    .search { width: 100%; padding: 10px 16px; border: none; border-bottom: 1px solid #ededed; font-size: 15px; }
    .todo-list { list-style: none; margin: 0; padding: 0; }
    .todo-list li { display: flex; align-items: center; gap: 10px; padding: 12px 16px; border-bottom: 1px solid #ededed; }
    .todo-list li.completed label { color: #949494; text-decoration: line-through; }
    .todo-list li label { flex: 1; }
    .destroy { border: none; background: none; color: #949494; cursor: pointer; font-size: 18px; }
    .footer { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px; color: #777; border-top: 1px solid #ededed; }
    .filters { list-style: none; display: flex; gap: 8px; margin: 0; padding: 0; }
    .filters a { text-decoration: none; color: inherit; padding: 2px 7px; border: 1px solid transparent; border-radius: 3px; }
    .filters a.selected { border-color: #b83f45; }
    .hidden { display: none; }
  </style>
</head>
<body>
  <section class="todoapp" aria-label="Todo application">
    <header>
      <h1>todos</h1>
      <input class="new-todo" data-test="new-todo" aria-label="New todo"
             placeholder="What needs to be done?" autofocus />
    </header>

    <main>
      <label class="toggle-all-label"><input id="toggle-all" class="toggle-all hidden" type="checkbox"
             data-test="toggle-all" aria-label="Mark all as complete" /> Mark all as complete</label>
      <input class="search" data-test="search" type="search" aria-label="Search todos"
             placeholder="Search todos…" />
      <ul class="todo-list" data-test="todo-list"></ul>
    </main>

    <footer class="footer hidden">
      <span class="todo-count" data-test="todo-count"></span>
      <ul class="filters">
        <li><a href="#/all" class="selected">All</a></li>
        <li><a href="#/active">Active</a></li>
        <li><a href="#/completed">Completed</a></li>
      </ul>
      <button class="clear-completed hidden" data-test="clear-completed">Clear completed</button>
    </footer>
  </section>

  <script>
    const todos = [];
    let filter = 'all';
    let search = '';
    const $ = (s) => document.querySelector(s);
    const list = $('.todo-list'), footer = $('.footer'), count = $('.todo-count');
    const clear = $('.clear-completed');
    const toggleAll = $('#toggle-all');

    function visible(t) {
      const byFilter = filter === 'all' || (filter === 'active' && !t.done) || (filter === 'completed' && t.done);
      return byFilter && t.title.toLowerCase().includes(search.toLowerCase());
    }
    function render() {
      list.innerHTML = '';
      todos.filter(visible).forEach((t) => {
        const li = document.createElement('li');
        li.className = 'todo-item' + (t.done ? ' completed' : '');
        const cb = document.createElement('input');
        cb.type = 'checkbox'; cb.checked = t.done; cb.setAttribute('aria-label', 'Toggle ' + t.title);
        cb.onclick = () => { t.done = cb.checked; render(); };
        const label = document.createElement('label'); label.textContent = t.title;
        const del = document.createElement('button');
        del.className = 'destroy'; del.textContent = '×'; del.setAttribute('aria-label', 'Delete ' + t.title);
        del.onclick = () => { todos.splice(todos.indexOf(t), 1); render(); };
        li.append(cb, label, del); list.append(li);
      });
      const left = todos.filter((t) => !t.done).length;
      count.textContent = left + (left === 1 ? ' item left' : ' items left');
      footer.classList.toggle('hidden', todos.length === 0);
      clear.classList.toggle('hidden', !todos.some((t) => t.done));
      toggleAll.classList.toggle('hidden', todos.length === 0);
      toggleAll.checked = todos.length > 0 && todos.every((t) => t.done);
      document.querySelectorAll('.filters a').forEach((a) =>
        a.classList.toggle('selected', a.getAttribute('href') === '#/' + filter));
    }
    $('.new-todo').addEventListener('keyup', (e) => {
      if (e.key === 'Enter' && e.target.value.trim()) {
        todos.push({ title: e.target.value.trim(), done: false });
        e.target.value = ''; render();
      }
    });
    $('.search').addEventListener('input', (e) => { search = e.target.value; render(); });
    clear.onclick = () => { for (let i = todos.length - 1; i >= 0; i--) if (todos[i].done) todos.splice(i, 1); render(); };
    toggleAll.onchange = () => { todos.forEach((t) => { t.done = toggleAll.checked; }); render(); };
    window.addEventListener('hashchange', () => { filter = (location.hash.slice(2) || 'all'); render(); });
    render();
  </script>
</body>
</html>

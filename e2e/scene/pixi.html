<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>PixiJS — scene target</title>
  <script src="./vendor/pixi.min.js"></script>
  <style>
    html,body{margin:0;font-family:system-ui,sans-serif}
    #panel{padding:8px 12px;background:#f3f4f6;border-top:1px solid #d1d5db}
    #selected b{color:#2563eb}
  </style>
</head>
<body>
  <div id="stage"></div>
  <div id="panel"><span id="selected" data-test="selected-node">Selected: <b>none</b></span></div>
  <script>
    const selEl = document.querySelector('#selected b');
    function select(label){ selEl.textContent = label; window.__lastSelected = label; }

    (async () => {
      const app = new PIXI.Application();
      await app.init({ width: 640, height: 420, background: '#ffffff', antialias: false });
      document.getElementById('stage').appendChild(app.canvas);
      app.stage.eventMode = 'static';

      const nodes = [
        { label: 'One',   x: 120, y: 110, color: 0xe11d48 },
        { label: 'Two',   x: 340, y: 200, color: 0x2563eb },
        { label: 'Three', x: 500, y: 300, color: 0x16a34a },
      ];
      for (const n of nodes) {
        const g = new PIXI.Graphics().rect(-45, -30, 90, 60).fill(n.color);
        g.position.set(n.x, n.y);      // position is the sprite centre (rect is centred)
        g.label = n.label;             // v8 identity property
        g.eventMode = 'static';
        g.cursor = 'pointer';
        // Real hit-testing: Pixi dispatches pointerdown to the graphic under the cursor.
        g.on('pointerdown', () => select(n.label));
        app.stage.addChild(g);
      }

      window.__PIXI_APP__ = app;
      requestAnimationFrame(() => { window.__sceneReady = true; });
    })();
  </script>
</body>
</html>
